# =============================================================================
# Tmux Configuration
# =============================================================================
# Based on mini.nvim ecosystem patterns with catppuccin theme

# =============================================================================
# General Settings
# =============================================================================

# Set prefix to Ctrl-a (more ergonomic than default Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Increase history buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't rename windows automatically
set -g allow-rename off

# Refresh status more often
set -g status-interval 5

# Focus events (for vim-tmux-navigator)
set -g focus-events on

# =============================================================================
# Key Bindings
# =============================================================================

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =============================================================================
# Neovim-Tmux Navigation (nvim-tmux-navigation)
# Smart pane switching with awareness of Vim splits
# =============================================================================

# Decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Copy-mode-vi bindings
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Navigate windows with Ctrl+Left/Right
bind -n C-Left previous-window
bind -n C-Right next-window

# Use Alt-arrow keys without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# =============================================================================
# TPM - Tmux Plugin Manager
# =============================================================================

# Set TPM directory
set -g @plugin 'tmux-plugins/tpm'

# Plugin: Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'  # matches your neovim catppuccin-mocha

# Plugin: Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save 'S'  # save with prefix + S
set -g @resurrect-restore 'R'  # restore with prefix + R

# Continuum settings
set -g @continuum-save-interval '5'  # save every 5 minutes
set -g @continuum-restore 'on'

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
